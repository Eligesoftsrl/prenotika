{% extends "base.html" %}

                     {% block content %}

                     <!-- // Basic multiple Column Form section start -->
                                    <section id="multiple-column-form">
                                        <div class="row match-height">
                                            <div class="col-12">
                                                <div class="card">
                                                    <div class="card-header">
                                                        <h4 class="card-title">Gestisci Aule</h4>
                                                    </div>
                                                    <div class="card-content">
                                                        <div class="card-body">
                                                        <div align="center">{{risposta}}</div>
                                                                <form method="post"  action="/nuovo_prodotto" name="Prodotto"  class="form">

                                                                <div class="form-body">
                                                                    <div class="row">

                                                                        <div class="col-md-6 col-12">
                                                                            <div class="form-label-group">
                                                                                <input type="text" id="Price" class="form-control" placeholder="N°Aula" name="Prezzo" />
                                                                                <label for="Price">N°Aula</label>
                                                                            </div>
                                                                        </div>

                                                                        <div class="col-md-6 col-12">
                                                                            <div class="form-label-group">
                                                                                <input type="text" id="Desc" class="form-control" placeholder="Descrizione" name="Descrizione" />
                                                                                <label for="Desc">Descrizione</label>
                                                                            </div>
                                                                        </div>







                                                                        <div class="col-md-6 col-12"></div>
                                                                       <div class="col-md-6 col-12 d-flex justify-content-end">
                                                                           <button type="submit" class="btn btn-primary btn-block block-page  text-nowrap mr-1 mb-1"  style="width:30%;">Inserisci Ora</button>
                                                                       </div>
                                                                    </div>
                                                                </div>
                                                            </form>


                                                             <hr>
                                                  <div class="table-responsive">
                                                                <table class="table zero-configuration">
                                                                    <thead>
                                                                        <tr>
                                                                            <th>Descrizione</th>
                                                                            <th>N°Aula</th>
                                                                            <th>Azioni</th>

                                                                        </tr>
                                                                    </thead>
                                                              <tbody>
                                                                   {% for pro in listapro: %}
                                                                   <tr><td>{{pro.nome}}</td><td>{{pro.prezzo}}</td><td><a href="{{pro.id}}/elimina_prodotto"><i class="bx bx-trash-alt"></i></a>&nbsp;<a href="{{pro.id}}/modifica_prodotto"><i class="bx bx-edit-alt"></i> </td></tr>

                                                                   {% endfor %}
                                                               </tbody>
                                                                    </tfoot>
                                                                </table>
                                                            </div>












                                                        </div>




                                                    </div>


                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                    <!-- // Basic multiple Column Form section end -->



                     {% endblock %}
