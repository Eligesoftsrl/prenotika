        <div class="content-overlay"></div>
        <div class="content-wrapper">
            <div class="content-header row">
            </div>
            <div class="content-body">
                <!-- register section starts -->
                <section class="row flexbox-container">
                    <div class="col-xl-8 col-10">
                        <div class="card bg-authentication mb-0">
                            <div class="row m-0">
                                <!-- register section left -->
                                <div class="col-md-6 col-12 px-0">
                                    <div class="card disable-rounded-right mb-0 p-2 h-100 d-flex justify-content-center">
                                        <div class="card-header pb-1">
                                            <div class="card-title">
                                                <h4 class="text-center mb-2">{{titolo}}</h4>
                                            </div>
                                        </div>
                                        <div class="text-center" style="margin-top:-25px;"
                                            <p> <small>Inserisci le credenziali di accesso</small></p>
                                        </div>
                                        <div class="card-content">
                                            <div class="card-body">
                                                <form action="/login" method="POST">

                                                        <div class="form-group mb-50">
                                                            <label for="inputfirstname4">Username</label>
                                                            <input type="text" class="form-control" name="Username" id="inputfirstname4" placeholder="Username" required>
                                                        </div>

                                                        <div class="form-group mb-50">
                                                            <label for="inputlastname4">Password</label>
                                                            <input type="password" class="form-control" name="Password" id="inputlastname4" placeholder="Password" required>
                                                        </div>


                                                    <button type="submit" class="btn btn-primary glow position-relative w-100">ACCEDI<i id="icon-arrow" class="bx bx-right-arrow-alt"></i></button>
                                                </form>

                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- image section right -->
                                <div class="col-md-6 d-md-block d-none text-center align-self-center p-3">
                                    <img class="img-fluid" src="{{ url_for('static',filename='app-assets/images/pages/register.png') }}" alt="branding logo">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- register section endss -->
            </div>
