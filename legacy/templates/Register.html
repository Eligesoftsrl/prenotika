                                        </div>
                                        <div class="card-content">
                                            <div class="card-body">
                                                <form action="/register" method="POST">

                                                        <div class="form-group mb-50">
                                                            <label for="inputfirstname4">Nome</label>
                                                            <input type="text" class="form-control" name="Nome" id="inputfirstname4" placeholder="Nome" required>
                                                        </div>

                                                        <div class="form-group mb-50">
                                                            <label for="inputlastname4">Cognome</label>
                                                            <input type="text" class="form-control" name="Cognome" id="inputlastname4" placeholder="Cognome" required>
                                                        </div>

                                                    <div class="form-group mb-50">
                                                        <label class="text-bold-600" for="exampleInputUsername1">Cellulare</label>
                                                        <input type="text" class="form-control" name="Cellulare" id="exampleInputUsername1" placeholder="Cellulare" required></div>
                                                    <div class="form-group mb-50">
                                                        <label class="text-bold-600" for="exampleInputEmail1">Email</label>
                                                        <input type="email" class="form-control" name="Email" id="exampleInputEmail1" placeholder="Email" required></div>
                                                    <div class="form-group mb-2">
                                                        <label class="text-bold-600" for="exampleInputPassword1">Data di nascita</label>
                                                        <input type="text" class="form-control" name="DataN" id="exampleInputPassword1" placeholder="Data di nascita">
                                                    </div>
                                                    <button type="submit" class="btn btn-primary glow position-relative w-100">ISCRIVITI<i id="icon-arrow" class="bx bx-right-arrow-alt"></i></button>
                                                </form>
                                                <hr>
